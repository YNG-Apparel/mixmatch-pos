<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Produk · Boutique POS</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div id="sidebarContainer"></div>
    <div class="main-content">
      <div id="topnavContainer"></div>
      <div class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <h4 id="formTitle">Tambah Produk</h4>
            <p class="text-muted">
              Masukkan detail produk baru atau perbarui produk existing.
            </p>
          </div>
          <a href="products.html" class="btn btn-outline-secondary"
            >Kembali ke Daftar</a
          >
        </div>
        <div class="card p-4">
          <form id="productForm">
            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label">Kode Produk</label
                ><input id="productCode" class="form-control" required />
              </div>
              <div class="col-md-8">
                <label class="form-label">Nama Produk</label
                ><input id="productName" class="form-control" required />
              </div>
              <div class="col-md-4">
                <label class="form-label">Kategori</label
                ><select id="categoryId" class="form-select" required></select>
              </div>
              <!-- <div class="col-md-4">
                <label class="form-label">Brand</label
                ><input id="brand" class="form-control" />
              </div> -->
              <div class="col-md-4">
                <label class="form-label">Warna</label
                ><input id="color" class="form-control" />
              </div>
              <div class="col-md-4">
                <label class="form-label">Ukuran</label
                ><input id="size" class="form-control" />
              </div>
              <div class="col-md-4">
                <label class="form-label">Material</label
                ><input id="material" class="form-control" />
              </div>
              <div class="col-md-4">
                <label class="form-label">Harga Pokok</label
                ><input
                  id="costPrice"
                  type="number"
                  min="0"
                  class="form-control"
                  required
                />
              </div>
              <div class="col-md-4">
                <label class="form-label">Harga Jual</label
                ><input
                  id="sellingPrice"
                  type="number"
                  min="0"
                  class="form-control"
                  required
                />
              </div>
              <div class="col-md-4">
                <label class="form-label">Stok Saat Ini</label
                ><input
                  id="currentStock"
                  type="number"
                  min="0"
                  class="form-control"
                  required
                />
              </div>
              <div class="col-md-4">
                <label class="form-label">Batas Minimum Stok</label
                ><input
                  id="minStockLevel"
                  type="number"
                  min="0"
                  class="form-control"
                  required
                />
              </div>
              <div class="col-md-12">
                <label class="form-label">Catatan</label
                ><textarea id="notes" class="form-control" rows="3"></textarea>
              </div>
              <div class="col-md-4">
                <label class="form-label">Status</label
                ><select id="status" class="form-select">
                  <option value="Active">Aktif</option>
                  <option value="Inactive">Nonaktif</option>
                </select>
              </div>
            </div>
            <div class="d-flex justify-content-end gap-2 mt-4">
              <button type="submit" class="btn btn-primary">
                Simpan Produk
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <div id="toastWrapper"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/products.js"></script>
  </body>
</html>
