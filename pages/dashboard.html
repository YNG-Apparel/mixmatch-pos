<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard · Boutique POS</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="main-content">
    <div id="topnavContainer"></div>
    <div class="container-fluid py-4">
      <div class="row g-3" id="dashboardSummary"></div>
      <div class="row g-3 mt-3">
        <div class="col-lg-8">
          <div class="card card-analytics p-3 h-100">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h5 class="mb-0">Tren Penjualan</h5>
              <span class="text-muted small">Grafik harian</span>
            </div>
            <canvas id="salesChart" height="200"></canvas>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="card card-analytics p-3 h-100">
            <h5 class="mb-3">Notifikasi Stok</h5>
            <div id="lowStockAlerts"></div>
          </div>
        </div>
      </div>
      <div class="row g-3 mt-3">
        <div class="col-lg-6">
          <div class="card p-3">
            <h5>Produk Terlaris</h5>
            <div class="table-responsive mt-3">
              <table class="table table-sm">
                <thead>
                  <tr><th>Kode</th><th>Produk</th><th>Terjual</th></tr>
                </thead>
                <tbody id="topProducts"></tbody>
              </table>
            </div>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="card p-3">
            <h5>Transaksi Terbaru</h5>
            <ul class="list-group list-group-flush" id="recentTransactions"></ul>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="toastWrapper"></div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../js/dashboard.js"></script>
</body>
</html>
