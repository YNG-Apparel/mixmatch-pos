<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POS · Mix & Match</title>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      .pos-container {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 1.5rem;
        height: calc(100vh - 120px);
      }
      .pos-main {
        display: flex;
        flex-direction: column;
      }
      .pos-search {
        margin-bottom: 1rem;
      }
      .pos-search input {
        font-size: 1.25rem;
        padding: 0.75rem;
        height: 60px;
      }
      .pos-search button {
        font-size: 1.1rem;
        padding: 0.75rem 1.5rem;
        height: 60px;
      }
      .pos-cart {
        flex: 1;
        overflow-y: auto;
      }
      .pos-summary {
        background: #f8f9fa;
        padding: 1.5rem;
        border-radius: 0.5rem;
      }
      .pos-button {
        font-size: 1.1rem;
        padding: 1rem 1.5rem;
        min-height: 50px;
      }
      .cart-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.75rem;
        border-bottom: 1px solid #e9ecef;
      }
      .cart-qty {
        width: 60px;
      }
      @media (max-width: 768px) {
        .pos-container {
          grid-template-columns: 1fr;
        }
        .pos-summary {
          order: -1;
        }
      }
    </style>
  </head>
  <body>
    <div id="sidebarContainer"></div>
    <div class="main-content">
      <div id="topnavContainer"></div>
      <div class="container-fluid py-3 px-4">
        <div class="pos-container">
          <div class="pos-main">
            <div class="pos-search">
              <div class="row g-2">
                <div class="col-md-9">
                  <input
                    id="productCode"
                    type="text"
                    class="form-control"
                    placeholder="Masukkan Kode Produk"
                    autocomplete="off"
                    autofocus
                  />
                </div>
                <div class="col-md-3">
                  <button
                    id="searchButton"
                    class="btn btn-primary w-100 pos-button"
                  >
                    CARI
                  </button>
                </div>
              </div>
            </div>
            <div class="pos-cart">
              <div class="table-responsive">
                <table class="table table-sm">
                  <thead class="table-light sticky-top">
                    <tr>
                      <th>Kode</th>
                      <th>Produk</th>
                      <th>Qty</th>
                      <th>Harga</th>
                      <th>Subtotal</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody id="cartTable"></tbody>
                </table>
              </div>
            </div>
          </div>
          <div class="pos-summary">
            <h5 class="mb-3">Ringkasan Pembayaran</h5>
            <div class="mb-3">
              <div class="d-flex justify-content-between mb-2">
                <strong>Subtotal:</strong
                ><span id="subtotalValue" class="fw-bold">Rp 0</span>
              </div>
              <div class="d-flex justify-content-between mb-2">
                <strong>Diskon (%):</strong
                ><input
                  id="discountAmount"
                  type="number"
                  min="0"
                  max="100"
                  class="form-control form-control-sm w-50"
                  value="0"
                />
              </div>
              <div class="border-top pt-2 mt-2 d-flex justify-content-between">
                <strong class="fs-5">Total:</strong
                ><span id="totalValue" class="fs-5 fw-bold">Rp 0</span>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Metode Pembayaran</label>
              <select id="paymentMethod" class="form-select">
                <option>Cash</option>
                <option>QRIS</option>
                <option>Transfer Bank</option>
                <option>Debit Card</option>
                <option>Credit Card</option>
              </select>
            </div>
            <button
              id="completeButton"
              class="btn btn-success w-100 pos-button"
            >
              SELESAIKAN PEMBAYARAN
            </button>
            <button
              id="clearButton"
              class="btn btn-outline-secondary w-100 mt-2"
            >
              Hapus Semua
            </button>
          </div>
        </div>
      </div>
    </div>
    <div id="toastWrapper"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/pos.js"></script>
  </body>
</html>
