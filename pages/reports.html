<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laporan · Boutique POS</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div id="sidebarContainer"></div>
    <div class="main-content">
      <div id="topnavContainer"></div>
      <div class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <h4>Laporan Penjualan</h4>
            <p class="text-muted">
              Filter laporan berdasarkan periode, kategori, produk dan kasir.
            </p>
          </div>
        </div>
        <div class="card p-3 mb-3">
          <div class="row g-3">
            <div class="col-md-3">
              <label class="form-label">Dari Tanggal</label
              ><input id="reportStart" type="date" class="form-control" />
            </div>
            <div class="col-md-3">
              <label class="form-label">Sampai Tanggal</label
              ><input id="reportEnd" type="date" class="form-control" />
            </div>
            <div class="col-md-3">
              <label class="form-label">Filter Kategori</label
              ><select id="reportCategory" class="form-select">
                <option value="">Semua</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label">Filter Kasir</label
              ><select id="reportCashier" class="form-select">
                <option value="">Semua</option>
              </select>
            </div>
          </div>
          <div class="mt-3 d-flex gap-2">
            <button id="runReport" class="btn btn-primary">
              Tampilkan Laporan
            </button>
            <button id="exportExcel" class="btn btn-outline-secondary">
              Ekspor Excel
            </button>
            <button id="exportPdf" class="btn btn-outline-secondary">
              Ekspor PDF
            </button>
          </div>
        </div>
        <div class="card p-3">
          <div class="table-responsive">
            <table class="table table-sm table-hover align-middle">
              <thead class="table-light">
                <tr>
                  <th>Nomor</th>
                  <th>Tanggal</th>
                  <th>Kasir</th>
                  <th>Pelanggan</th>
                  <th>Total</th>
                  <th>Metode</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="reportTable"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
    <div class="modal fade" id="receiptModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Preview Struk</h5>

            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body" id="receiptContent"></div>

          <div class="modal-footer">
            <button id="reprintReceipt" class="btn btn-success">
              Cetak Ulang
            </button>
          </div>
        </div>
      </div>
    </div>
    <div id="toastWrapper"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/reports.js"></script>
  </body>
</html>
