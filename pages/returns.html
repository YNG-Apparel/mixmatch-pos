<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retur · Boutique POS</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="main-content">
    <div id="topnavContainer"></div>
    <div class="container-fluid py-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <h4>Manajemen Retur</h4>
          <p class="text-muted">Catat retur dan tukar barang dengan cepat.</p>
        </div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#returnModal">Tambah Retur</button>
      </div>
      <div class="card p-3">
        <div class="table-responsive">
          <table class="table table-hover table-sm align-middle">
            <thead class="table-light"><tr><th>Nomor</th><th>Pelanggan</th><th>Produk</th><th>Jumlah</th><th>Alasan</th><th>Petugas</th><th>Tanggal</th></tr></thead>
            <tbody id="returnsTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="returnModal" tabindex="-1" aria-labelledby="returnModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="returnModalLabel">Tambah Retur</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Tutup"></button>
        </div>
        <div class="modal-body">
          <form id="returnForm">
            <div class="row g-3">
              <div class="col-md-6"><label class="form-label">Nomor Transaksi Asli</label><input id="originalReceipt" class="form-control" required /></div>
              <div class="col-md-6"><label class="form-label">Nama Pelanggan</label><input id="returnCustomer" class="form-control" /></div>
              <div class="col-md-6"><label class="form-label">Produk</label><input id="returnProduct" class="form-control" required /></div>
              <div class="col-md-3"><label class="form-label">Jumlah</label><input id="returnQuantity" type="number" min="1" class="form-control" required /></div>
              <div class="col-md-3"><label class="form-label">Refund (Rp)</label><input id="returnAmount" type="number" min="0" class="form-control" required /></div>
              <div class="col-12"><label class="form-label">Alasan Retur</label><textarea id="returnReason" class="form-control" rows="3"></textarea></div>
            </div>
            <div class="mt-4 text-end"><button class="btn btn-primary">Simpan Retur</button></div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div id="toastWrapper"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../js/returns.js"></script>
</body>
</html>
