<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riwayat Penjualan · Mix & Match</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="main-content">
    <div id="topnavContainer"></div>
    <div class="container-fluid py-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <h4>Riwayat Penjualan Saya</h4>
          <p class="text-muted">Daftar transaksi penjualan yang telah diselesaikan.</p>
        </div>
      </div>
      <div class="card p-3">
        <div class="table-responsive">
          <table class="table table-sm table-hover align-middle">
            <thead class="table-light"><tr><th>No. Struk</th><th>Tanggal & Waktu</th><th>Total</th><th>Metode</th><th>Status</th></tr></thead>
            <tbody id="salesTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  <div id="toastWrapper"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../js/sales-history.js"></script>
</body>
</html>
