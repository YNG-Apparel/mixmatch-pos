<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produk · Boutique POS</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="main-content">
    <div id="topnavContainer"></div>
    <div class="container-fluid py-4">
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-3 mb-3">
        <div>
          <h4>Daftar Produk</h4>
          <p class="text-muted">Kelola kode produk, harga, stok, dan atribut pakaian.</p>
        </div>
        <a href="product-form.html" class="btn btn-primary">Tambah Produk Baru</a>
      </div>
      <div class="card p-3 mb-3">
        <div class="row gy-2">
          <div class="col-md-3"><input id="searchInput" type="text" class="form-control" placeholder="Cari kode, nama, kategori..." /></div>
          <div class="col-md-3"><input id="brandFilter" type="text" class="form-control" placeholder="Filter merek" /></div>
          <div class="col-md-3"><input id="colorFilter" type="text" class="form-control" placeholder="Filter warna" /></div>
          <div class="col-md-3"><button id="filterButton" class="btn btn-secondary w-100">Cari & Filter</button></div>
        </div>
      </div>
      <div class="card p-3">
        <div class="table-responsive">
          <table class="table table-hover table-sm align-middle">
            <thead class="table-light"><tr><th>Kode</th><th>Nama Produk</th><th>Kategori</th><th>Brand</th><th>Warna</th><th>Ukuran</th><th>Stok</th><th>Harga Jual</th><th>Status</th><th>Aksi</th></tr></thead>
            <tbody id="productsTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  <div id="toastWrapper"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../js/products.js"></script>
</body>
</html>
