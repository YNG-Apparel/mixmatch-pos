<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kategori · Boutique POS</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div id="sidebarContainer"></div>
    <div class="main-content">
      <div id="topnavContainer"></div>
      <div class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <h4>Kelola Kategori</h4>
            <p class="text-muted">
              Tambahkan, ubah, dan hapus kategori produk.
            </p>
          </div>
          <button
            class="btn btn-primary"
            data-bs-toggle="modal"
            data-bs-target="#categoryModal"
          >
            Tambah Kategori
          </button>
        </div>
        <div class="card p-3">
          <div class="table-responsive">
            <table class="table table-hover table-sm align-middle">
              <thead class="table-light">
                <tr>
                  <th>Nama Kategori</th>
                  <th>Deskripsi</th>
                  <th>Tanggal</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="categoriesTable"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="categoryModal"
      tabindex="-1"
      aria-labelledby="categoryModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="categoryModalLabel">Tambah Kategori</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Tutup"
            ></button>
          </div>
          <div class="modal-body">
            <form id="categoryForm">
              <div class="mb-3">
                <label class="form-label">Nama Kategori</label>
                <input id="categoryName" class="form-control" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Deskripsi</label>
                <textarea
                  id="categoryDescription"
                  class="form-control"
                  rows="3"
                ></textarea>
              </div>
              <button class="btn btn-primary">Simpan Kategori</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div id="toastWrapper"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/categories.js"></script>
  </body>
</html>
