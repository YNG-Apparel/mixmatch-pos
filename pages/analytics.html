<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analisis Bisnis · Boutique POS</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="main-content">
    <div id="topnavContainer"></div>
    <div class="container-fluid py-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <h4>Analisis Bisnis</h4>
          <p class="text-muted">Laporan analitik, rekomendasi produk, dan tren penjualan.</p>
        </div>
      </div>
      <div class="row g-3" id="analyticsCards"></div>
      <div class="row g-3 mt-3">
        <div class="col-lg-6">
          <div class="card p-3">
            <h5>Produk Terlaris</h5>
            <ul class="list-group list-group-flush mt-3" id="bestSellingProducts"></ul>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="card p-3">
            <h5>Produk Slow Moving</h5>
            <ul class="list-group list-group-flush mt-3" id="slowMovingProducts"></ul>
          </div>
        </div>
      </div>
      <div class="row g-3 mt-3">
        <div class="col-lg-12">
          <div class="card p-3">
            <h5>Rekomendasi Bisnis</h5>
            <div id="businessRecommendations" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="toastWrapper"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../js/analytics.js"></script>
</body>
</html>
