<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pengaturan · Boutique POS</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="main-content">
    <div id="topnavContainer"></div>
    <div class="container-fluid py-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <h4>Pengaturan</h4>
          <p class="text-muted">Kelola profil akun, preferensi sistem, dan informasi toko.</p>
        </div>
      </div>
      <div class="card p-3 mb-3">
        <h5>Profil Pengguna</h5>
        <form id="settingsForm" class="row g-3 mt-3">
          <div class="col-md-6"><label class="form-label">Nama Lengkap</label><input id="profileFullName" class="form-control" required /></div>
          <div class="col-md-6"><label class="form-label">Email</label><input id="profileEmail" class="form-control" disabled /></div>
          <div class="col-md-6"><label class="form-label">Telepon</label><input id="profilePhone" class="form-control" /></div>
          <div class="col-md-6"><label class="form-label">Alamat</label><input id="profileAddress" class="form-control" /></div>
          <div class="col-12"><label class="form-label">Nama Toko</label><input id="shopName" class="form-control" placeholder="Nama boutique Anda" /></div>
          <div class="col-md-6"><label class="form-label">Telepon Toko</label><input id="shopPhone" class="form-control" /></div>
          <div class="col-md-6"><label class="form-label">Alamat Toko</label><input id="shopAddress" class="form-control" /></div>
          <div class="col-12"><button class="btn btn-primary">Simpan Pengaturan</button></div>
        </form>
      </div>
    </div>
  </div>
  <div id="toastWrapper"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../js/settings.js"></script>
</body>
</html>
