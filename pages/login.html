<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login · Mix & Match</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="card shadow-sm">
            <div class="card-body p-5">
              <div class="text-center mb-4">
                <img
                  src="../assets/logo.svg"
                  alt="Mix & Match"
                  class="img-fluid"
                  style="max-height: 72px"
                />
                <h1 class="h4 mt-3">Login Staf Mix & Match</h1>
                <p class="text-muted">
                  Masuk untuk melanjutkan ke sistem kasir dan inventaris.
                </p>
              </div>
              <form id="loginForm">
                <div class="mb-3">
                  <label for="login" class="form-label"
                    >Username atau Email</label
                  >
                  <input
                    type="text"
                    id="login"
                    class="form-control"
                    placeholder="Masukkan username atau email"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Kata Sandi</label>

                  <div class="position-relative">
                    <input
                      type="password"
                      id="password"
                      class="form-control pe-5"
                      placeholder="Masukkan kata sandi"
                      required
                    />

                    <button
                      type="button"
                      id="togglePassword"
                      class="btn position-absolute top-50 end-0 translate-middle-y border-0 bg-transparent"
                      style="z-index: 10"
                    >
                      👁
                    </button>
                  </div>
                </div>
                <button
                  id="loginButton"
                  type="submit"
                  class="btn btn-primary w-100"
                >
                  Masuk
                </button>
              </form>
              <div class="mt-4 text-center text-muted small">
                Hubungi administrator jika Anda tidak memiliki akun.
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="toastWrapper"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/auth.js"></script>
  </body>
</html>
